name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Syntax check all JS files
        run: |
          for f in app.js src/**/*.js; do
            node -c "$f"
          done

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://localhost:5432/test
          SESSION_SECRET: test-secret
